# Define the upstream API service
upstream api_backend {
    server api:8000;
}

# Define the upstream Streamlit service
upstream streamlit_backend {
    server streamlit:8501;
}

server {
    listen 80;
    server_name _;

    # Basic authentication
    auth_basic "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # IP restriction - replace with your IP or CIDR
    # Example: allow 203.0.113.0/24; deny all;
    # For now, we'll allow all and comment out - user must update
    # allow 203.0.113.0/24;
    # deny all;

    # Alternatively, we can use geo or map, but simple allow/deny is fine.
    # We'll leave it open by default and instruct user to update.

    # API endpoints
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Streamlit endpoints
    location /streamlit/ {
        proxy_pass http://streamlit_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint without authentication (optional)
    # If you want to allow health checks without auth, uncomment below
    # location /health {
    #     auth_basic off;
    #     proxy_pass http://api_backend;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}